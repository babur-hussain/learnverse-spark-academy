<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 Keyboard Puzzle - Learn to Type!</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Avenir Next Rounded', 'Avenir Next', 'Nunito', 'Helvetica Rounded', 'Trebuchet MS', 'Arial Rounded MT Bold', 'Comic Sans MS', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.game-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    width: 100%;
    height: 100vh;
}

.puzzle-board {
    position: relative;
    width: 800px;
    height: 640px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.background-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

.puzzles-grid {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(6, 1fr);
    z-index: 2;
}

.puzzle-piece {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    cursor: default;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.puzzle-piece::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
}

.puzzle-piece.current {
    background: linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);
    animation: pulse 1s infinite;
    z-index: 10;
    box-shadow: 0 0 20px rgba(246, 173, 85, 0.6);
    border: 2px solid #fff;
}

.puzzle-piece.uncovered {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8) rotateY(90deg);
}

.puzzle-piece.wrong {
    animation: shake 0.4s ease;
    background: linear-gradient(135deg, #fc8181 0%, #e53e3e 100%);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

@keyframes uncoverPiece {
    0% { 
        opacity: 1; 
        transform: scale(1) rotateY(0deg);
    }
    50% {
        opacity: 0.5;
        transform: scale(1.1) rotateY(45deg);
    }
    100% { 
        opacity: 0; 
        transform: scale(0.8) rotateY(90deg);
    }
}

.puzzle-piece.uncover-animation {
    animation: uncoverPiece 0.4s ease forwards;
}

/* Progress Indicator */
.progress-indicator {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #4ECDC4;
    color: white;
    padding: 15px 25px;
    border-radius: 20px;
    font-size: 20px;
    box-shadow: 0 4px 0 #3BA99C;
}

/* Current Key Display */
.current-key-display {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.95);
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 24px;
    color: #333;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    gap: 15px;
}

.current-key {
    background: linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 15px;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    box-shadow: 0 4px 0 #c05621;
    min-width: 60px;
    text-align: center;
}

/* Home Button */
.home-button {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(180deg, #FF6B6B 0%, #EE5A5A 100%);
    color: #fff;
    padding: 14px 22px;
    border-radius: 18px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    box-shadow: 0 5px 0 #CC4444;
    transition: transform 0.1s, box-shadow 0.1s;
}

.home-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #CC4444;
}

.home-button:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #CC4444;
}

/* Sound Toggle */
.sound-toggle {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #FFE66D;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 0 #F4A261;
}

/* Instructions */
.instructions {
    position: fixed;
    bottom: 30px;
    background: rgba(255, 255, 255, 0.9);
    padding: 15px 30px;
    border-radius: 20px;
    font-size: 18px;
    color: #333;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

/* Celebration */
.celebration {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px;
    color: #FFE66D;
    text-shadow: 3px 3px 0 #FF6B6B;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    text-align: center;
}

.celebration.show {
    animation: celebrate 1s ease forwards;
}

@keyframes celebrate {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
}

/* Start Screen */
.start-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 2000;
    overflow-y: auto;
    padding: 20px;
    padding-top: 30px;
}

.start-screen h1 {
    font-size: 56px;
    color: #FFE66D;
    text-shadow: 4px 4px 0 #FF6B6B;
    margin-bottom: 10px;
}

.puzzle-icon {
    font-size: 80px;
    margin-bottom: 30px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.start-btn {
    background: linear-gradient(180deg, #4ECDC4 0%, #44A08D 100%);
    color: white;
    border: none;
    padding: 20px 60px;
    font-size: 32px;
    font-family: inherit;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 #2D7A6E;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 20px;
}

.start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #2D7A6E;
}

.start-btn:active {
    transform: translateY(2px);
    box-shadow: 0 4px 0 #2D7A6E;
}

.language-buttons {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.lang-btn {
    background: linear-gradient(180deg, #FF6B6B 0%, #EE5A5A 100%);
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 24px;
    font-family: inherit;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 0 #CC4444;
    transition: transform 0.1s, box-shadow 0.1s;
}

.lang-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #CC4444;
}

.lang-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #CC4444;
}

.lang-btn.polish {
    background: linear-gradient(180deg, #DC143C 0%, #B22222 100%);
    box-shadow: 0 5px 0 #8B0000;
}

.lang-btn.polish:hover {
    box-shadow: 0 7px 0 #8B0000;
}

.lang-btn.polish:active {
    box-shadow: 0 3px 0 #8B0000;
}

.lang-btn.english {
    background: linear-gradient(180deg, #3366CC 0%, #2255AA 100%);
    box-shadow: 0 5px 0 #1A4488;
}

.lang-btn.english:hover {
    box-shadow: 0 7px 0 #1A4488;
}

.lang-btn.english:active {
    box-shadow: 0 3px 0 #1A4488;
}

.lang-btn.active {
    transform: translateY(-3px);
    box-shadow: 0 8px 0 rgba(0, 0, 0, 0.28);
    outline: 3px solid rgba(255, 255, 255, 0.7);
}

/* Image Selection */
.image-selector-container {
    width: 100%;
    max-width: 500px;
    margin-top: 10px;
}

.image-buttons {
    display: flex;
    gap: 12px;
    padding: 15px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.5) rgba(0,0,0,0.1);
    background: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    max-width: 500px;
}

.image-buttons::-webkit-scrollbar {
    height: 8px;
}

.image-buttons::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.1);
    border-radius: 4px;
}

.image-buttons::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.5);
    border-radius: 4px;
}

.image-buttons::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.7);
}

.image-btn {
    flex: 0 0 auto;
    width: 100px;
    height: 100px;
    border: 4px solid transparent;
    border-radius: 15px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    scroll-snap-align: center;
    position: relative;
}

.image-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-btn .random-icon {
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(100% - 22px);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.image-btn .image-name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    font-size: 11px;
    padding: 4px 3px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.image-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
}

.image-btn.active {
    border-color: #FFE66D;
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(255, 230, 109, 0.6);
}

/* Size Selection Buttons */
.size-buttons {
    display: flex;
    gap: 15px;
    margin-top: 10px;
    justify-content: center;
}

.size-btn {
    background: linear-gradient(180deg, #9f7aea 0%, #805ad5 100%);
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 20px;
    font-family: inherit;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 5px 0 #6b46c1;
    transition: transform 0.1s, box-shadow 0.1s;
}

.size-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #6b46c1;
}

.size-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #6b46c1;
}

.size-btn.active {
    background: linear-gradient(180deg, #ffd54f 0%, #ff9e00 100%);
    color: #241400;
    box-shadow: 0 5px 0 #cc7a00;
    outline: 3px solid rgba(255, 255, 255, 0.7);
    transform: translateY(-3px);
}

/* Finish Screen */
.finish-screen {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3000;
    padding: 20px;
}

.finish-card {
    background: linear-gradient(180deg, #ffe27a 0%, #ffc94a 100%);
    border-radius: 24px;
    padding: 30px 28px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    max-width: 400px;
    width: 100%;
    animation: popIn 0.4s ease;
}

.finish-title {
    font-size: 28px;
    color: #5a3b00;
    margin-bottom: 20px;
}

.finish-image-preview {
    width: 100%;
    max-width: 300px;
    height: 200px;
    margin: 0 auto 20px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
}

.finish-image-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.finish-button {
    background: linear-gradient(180deg, #4ECDC4 0%, #44A08D 100%);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 20px;
    font-size: 20px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 0 #2D7A6E;
    transition: transform 0.1s, box-shadow 0.1s;
}

.finish-button:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #2D7A6E;
}

@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* Confetti */
.confetti-screen {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2500;
}

.confetti-piece {
    position: absolute;
    top: -12px;
    width: 8px;
    height: 14px;
    border-radius: 2px;
    opacity: 0;
    transform: translateY(0) rotate(0deg);
    animation: confettiFall var(--d, 0.95s) ease-out forwards;
    animation-delay: var(--delay, 0s);
    background: var(--c, #ff6b6b);
}

@keyframes confettiFall {
    0% { opacity: 0; transform: translate3d(0, -10px, 0) rotate(var(--r, 0deg)); }
    10% { opacity: 1; }
    100% { opacity: 1; transform: translate3d(var(--drift, 0px), 120vh, 0) rotate(calc(var(--r, 0deg) + 240deg)); }
}

/* Responsive Styles */
@media (max-width: 900px) {
    .puzzle-board {
        width: 100%;
        max-width: 600px;
        height: auto;
        aspect-ratio: 10 / 8;
    }

    .puzzle-piece {
        font-size: 20px;
    }

    .current-key-display {
        bottom: 80px;
        font-size: 18px;
        padding: 12px 20px;
    }

    .current-key {
        font-size: 24px;
        padding: 8px 15px;
    }
}

@media (max-width: 600px) {
    .start-screen {
        padding: 10px;
        padding-top: 15px;
        justify-content: flex-start;
    }
    
    .puzzle-board {
        max-width: 95vw;
    }

    .puzzle-piece {
        font-size: 14px;
    }

    .start-screen h1 {
        font-size: 24px;
        margin-bottom: 5px;
    }

    .puzzle-icon {
        font-size: 35px;
        margin-bottom: 8px;
    }
    
    .start-screen p {
        font-size: 12px !important;
        margin: 5px 0 !important;
    }

    .language-buttons {
        flex-direction: row;
        gap: 8px;
        margin-top: 8px;
    }

    .lang-btn {
        font-size: 12px;
        padding: 8px 16px;
    }

    .image-selector-container {
        margin-top: 5px;
    }

    .image-buttons {
        padding: 8px;
        max-width: 95vw;
        max-height: 85px;
        gap: 8px;
    }
    
    .image-btn {
        width: 65px;
        height: 65px;
    }
    
    .image-btn .image-name {
        font-size: 8px;
        padding: 2px;
    }
    
    .size-buttons {
        gap: 6px;
        margin-top: 8px;
    }
    
    .size-btn {
        font-size: 12px;
        padding: 8px 14px;
    }
    
    .start-btn {
        font-size: 18px;
        padding: 12px 30px;
        margin-top: 10px;
    }

    .progress-indicator {
        font-size: 14px;
        padding: 10px 15px;
        top: 10px;
        left: 10px;
    }

    .home-button {
        font-size: 14px;
        padding: 10px 15px;
        top: 10px;
        right: 10px;
    }

    .sound-toggle {
        font-size: 12px;
        padding: 6px 12px;
    }

    .instructions {
        font-size: 14px;
        padding: 10px 20px;
        bottom: 15px;
    }

    .current-key-display {
        bottom: 60px;
        font-size: 16px;
    }

    .celebration {
        font-size: 48px;
    }
}

/* On-screen Keyboard */
.on-screen-keyboard {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    max-width: 640px;
    width: calc(100% - 20px);
    z-index: 100;
    backdrop-filter: blur(10px);
}

.key-row {
    display: flex;
    justify-content: center;
    gap: 4px;
}

.key-btn {
    flex: 1 1 0;
    max-width: 48px;
    height: 44px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, #f6ad55 0%, #ed8936 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    box-shadow: 0 3px 0 #c05621, 0 4px 10px rgba(0, 0, 0, 0.15);
    cursor: pointer;
    transition: transform 0.05s ease, box-shadow 0.1s ease;
}

.key-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #c05621, 0 2px 5px rgba(0, 0, 0, 0.15);
}

/* Keyboard Toggle Button */
.keyboard-toggle {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #FFE66D;
    border: none;
    padding: 8px 16px;
    border-radius: 16px;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 #F4A261;
    z-index: 50;
}

/* Mobile keyboard adjustments */
@media (max-width: 600px) {
    .on-screen-keyboard {
        padding: 8px;
        gap: 4px;
        bottom: 5px;
    }
    
    .key-row {
        gap: 3px;
    }
    
    .key-btn {
        max-width: 32px;
        height: 38px;
        font-size: 13px;
        border-radius: 8px;
    }
    
    .keyboard-toggle {
        top: 56px;
        font-size: 12px;
        padding: 6px 12px;
    }
    
    /* Adjust game layout when keyboard is visible */
    .game-container {
        height: auto;
        padding-bottom: 200px;
    }
    
    .puzzle-board {
        max-height: 45vh;
    }
    
    .current-key-display {
        bottom: 180px;
        font-size: 12px;
        padding: 6px 12px;
        gap: 8px;
    }
    
    .current-key {
        font-size: 18px;
        padding: 6px 12px;
        min-width: 40px;
    }
    
    .instructions {
        display: none;
    }
    
    /* Bigger image buttons on mobile for better visibility */
    .image-buttons {
        padding: 8px;
        max-height: 80px;
    }
    
    .image-btn {
        width: 60px;
        height: 60px;
    }
    
    .image-btn .image-name {
        font-size: 8px;
        padding: 2px;
    }
}

</style>

<style>
  .start-screen .start-btn {
    font-size: 32px !important;
    padding: 20px 60px !important;
    margin-top: 30px !important;
    border-radius: 40px !important;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2) !important;
    transform: scale(1.1) !important;
  }
</style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>Keyboard Puzzle!</h1>
        <div class="puzzle-icon">🧩</div>
        
        
        <p id="startImageLabel" style="font-size: 22px; color: #333; margin: 20px 0 12px;">Choose an image:</p>
        <div class="image-buttons" id="imageButtons">
            <!-- Images will be populated by JS -->
        </div>
        <p id="scrollHint" style="font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 8px;">← Scroll to see more →</p>
        <p id="startSizeLabel" style="font-size: 22px; color: #333; margin: 20px 0 12px;">Choose grid size:</p>
        <div class="size-buttons" id="sizeButtons">
            <!-- Size buttons will be populated by JS -->
        </div>
        <button class="start-btn" id="startBtn" onclick="startGame()">Start!</button>
        
    </div>

    <div class="game-container" id="gameContainer">
        <div class="puzzle-board" id="puzzleBoard">
            <img class="background-image" id="backgroundImage" src="" alt="Hidden image">
            <div class="puzzles-grid" id="puzzlesGrid"></div>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 Sound ON</button>
    <button class="keyboard-toggle" id="keyboardToggle" onclick="toggleKeyboard()">⌨️ Show Keyboard</button>
    <button class="home-button" id="homeButton" onclick="goHome()">🏠 Menu</button>
    <div class="progress-indicator"><span id="progressLabel">Progress</span>: <span id="progress">0</span>/<span id="progressTotal">80</span></div>

// Sound functions using Audio() as in letter-jump
function preloadLetterSounds() {
    const symbols = 'abcdefghijklmnopqrstuvwxyz0123456789'.split('');
    preloadedLetterSounds = {};

    const langFolder = currentLanguage === 'polish' ? 'pl' : 'en';
    
    symbols.forEach(symbol => {
        const upper = symbol.toUpperCase();
        const path = `../assets/letters/${langFolder}/${langFolder}_${upper}.mp3`;
        const audio = new Audio(path);
        audio.preload = 'auto';
        preloadedLetterSounds[symbol] = audio;
    });
}

function playLetterSound(letter) {
    if (!soundEnabled || !letter) return;
    
    const symbol = letter.toLowerCase();
    const audio = preloadedLetterSounds[symbol];
    
    if (audio) {
        const clone = audio.cloneNode();
        clone.volume = 0.6;
        clone.play().catch(() => {});
    }
}

function playCorrectSound() {
    if (!soundEnabled) return;
    
    // Generate a simple positive sound
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.setValueAtTime(523, audioContext.currentTime);
    oscillator.frequency.setValueAtTime(659, audioContext.currentTime + 0.1);
    oscillator.frequency.setValueAtTime(784, audioContext.currentTime + 0.2);
    
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
}

function playWrongSound() {
    if (!soundEnabled) return;
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.type = 'sawtooth';
    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
    oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.2);
    
    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
}

function playSuccessSound() {
    if (!soundEnabled) return;
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    
    notes.forEach((freq, i) => {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.12);
        
        gainNode.gain.setValueAtTime(0.25, audioContext.currentTime + i * 0.12);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.12 + 0.2);
        
        oscillator.start(audioContext.currentTime + i * 0.12);
        oscillator.stop(audioContext.currentTime + i * 0.12 + 0.2);
    });
}

// Shuffle array
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Generate puzzle pieces with random characters
function generatePuzzlePieces() {
    puzzlePieces = [];
    
    // Update grid dimensions based on current mode
    GRID_COLS = GRID_MODES[currentGridMode].cols;
    GRID_ROWS = GRID_MODES[currentGridMode].rows;
    TOTAL_PIECES = GRID_COLS * GRID_ROWS;
    
    // Create array of indices and shuffle for random order
    const indices = [];
    for (let i = 0; i < TOTAL_PIECES; i++) {
        indices.push(i);
    }
    shuffleArray(indices);
    
    // Assign RANDOM characters to each piece
    const characters = getCharacters();
    for (let i = 0; i < TOTAL_PIECES; i++) {
        const randomChar = characters[Math.floor(Math.random() * characters.length)];
        puzzlePieces.push({
            index: i,
            order: indices[i], // Random order for uncovering
            character: randomChar,
            uncovered: false
        });
    }
    
    // Sort by order to determine which piece to uncover next
    puzzlePieces.sort((a, b) => a.order - b.order);
}

// Render the puzzle grid
function renderPuzzleGrid() {
    const grid = document.getElementById('puzzlesGrid');
    grid.innerHTML = '';
    
    // Update grid CSS for current mode
    grid.style.gridTemplateColumns = `repeat(${GRID_COLS}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${GRID_ROWS}, 1fr)`;
    
    // Create pieces in grid order
    const sortedByIndex = [...puzzlePieces].sort((a, b) => a.index - b.index);
    
    sortedByIndex.forEach(piece => {
        const pieceEl = document.createElement('div');
        pieceEl.className = 'puzzle-piece';
        pieceEl.id = `piece-${piece.index}`;
        pieceEl.textContent = piece.character;
        
        if (piece.uncovered) {
            pieceEl.classList.add('uncovered');
        }
        
        grid.appendChild(pieceEl);
    });
    
    highlightCurrentPiece();
}

// Highlight the current piece to uncover
function highlightCurrentPiece() {
    // Remove current class from all pieces
    document.querySelectorAll('.puzzle-piece.current').forEach(el => {
        el.classList.remove('current');
    });
    
    if (currentPieceIndex < TOTAL_PIECES) {
        const currentPiece = puzzlePieces[currentPieceIndex];
        const pieceEl = document.getElementById(`piece-${currentPiece.index}`);
        if (pieceEl) {
            pieceEl.classList.add('current');
        }
        
        // Update current key display
        document.getElementById('currentKey').textContent = currentPiece.character;
        
        // Play the letter sound
        setTimeout(() => {
            playLetterSound(currentPiece.character);
        }, 100);
    }
}

// Update progress display
function updateProgress() {
    document.getElementById('progress').textContent = currentPieceIndex;
}

// Update background color based on progress
function updateBackground() {
    const progress = currentPieceIndex / TOTAL_PIECES;
    
    // Start: light playful purple/pink -> End: serious deep blue/purple
    const startHue1 = 280;  // Light purple
    const endHue1 = 220;    // Deep blue
    const startHue2 = 320;  // Pink
    const endHue2 = 260;    // Deep purple
    
    const hue1 = startHue1 + (endHue1 - startHue1) * progress;
    const hue2 = startHue2 + (endHue2 - startHue2) * progress;
    
    // Saturation: stays vivid but gets slightly more intense
    const sat1 = 70 + progress * 15;
    const sat2 = 60 + progress * 20;
    
    // Lightness: goes from light to darker
    const light1 = 70 - progress * 30;  // 70% -> 40%
    const light2 = 55 - progress * 25;  // 55% -> 30%
    
    document.body.style.background = `linear-gradient(180deg, 
        hsl(${hue1}, ${sat1}%, ${light1}%) 0%, 
        hsl(${hue2}, ${sat2}%, ${light2}%) 100%)`;
}

// Handle key press
function handleKeyPress(e) {
    if (!gameStarted) return;
    if (e.repeat) return;
    
    const key = e.key.toUpperCase();
    processKey(key);
}

// Process a key (from physical or virtual keyboard)
function processKey(key) {
    // Only handle A-Z and 0-9
    if (!/^[A-Z0-9]$/.test(key)) return;
    
    if (currentPieceIndex >= TOTAL_PIECES) return;
    
    const currentPiece = puzzlePieces[currentPieceIndex];
    const pieceEl = document.getElementById(`piece-${currentPiece.index}`);
    
    if (key === currentPiece.character) {
        // Correct key pressed
        playCorrectSound();
        triggerConfetti();
        
        currentPiece.uncovered = true;
        if (pieceEl) {
            pieceEl.classList.remove('current');
            pieceEl.classList.add('uncover-animation');
            
            setTimeout(() => {
                pieceEl.classList.add('uncovered');
            }, 400);
        }
        
        currentPieceIndex++;
        updateProgress();
        updateBackground();
        
        if (currentPieceIndex >= TOTAL_PIECES) {
            // Game complete!
            setTimeout(() => {
                gameComplete();
            }, 500);
        } else {
            // Move to next piece
            setTimeout(() => {
                highlightCurrentPiece();
            }, 300);
        }
    } else {
        // Wrong key pressed
        playWrongSound();
        
        if (pieceEl) {
            pieceEl.classList.add('wrong');
            setTimeout(() => {
                pieceEl.classList.remove('wrong');
            }, 400);
        }
        
        // Replay the correct letter sound
        setTimeout(() => {
            playLetterSound(currentPiece.character);
        }, 400);
    }
}

// Handle virtual keyboard key press
function handleVirtualKey(symbol) {
    if (!gameStarted) return;
    processKey(symbol);
}

// Render on-screen keyboard
function renderKeyboard() {
    const keyboard = document.getElementById('onScreenKeyboard');
    if (!keyboard) return;
    keyboard.innerHTML = '';
    keyboard.style.display = keyboardVisible ? 'flex' : 'none';
    KEYBOARD_LAYOUT.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'key-row';
        row.forEach(symbol => {
            const btn = document.createElement('button');
            btn.className = 'key-btn';
            btn.textContent = symbol;
            btn.setAttribute('aria-label', symbol);
            btn.addEventListener('click', () => handleVirtualKey(symbol));
            rowEl.appendChild(btn);
        });
        keyboard.appendChild(rowEl);
    });
}

// Update keyboard toggle button
function updateKeyboardButton() {
    const t = getUIText();
    const btn = document.getElementById('keyboardToggle');
    if (btn) {
        btn.textContent = keyboardVisible ? t.keyboardHide : t.keyboardShow;
        btn.style.display = isMobile ? 'none' : 'block';
    }
    const keyboard = document.getElementById('onScreenKeyboard');
    if (keyboard) {
        keyboard.style.display = keyboardVisible ? 'flex' : 'none';
    }
}

// Toggle keyboard visibility
function toggleKeyboard() {
    keyboardVisible = !keyboardVisible;
    updateKeyboardButton();
}

// Game complete
function gameComplete() {
    playSuccessSound();
    triggerBigConfetti();
    
    const celebration = document.getElementById('celebration');
    celebration.classList.add('show');
    
    setTimeout(() => {
        celebration.classList.remove('show');
        showFinishScreen();
    }, 1000);
}

    return currentLanguage === 'polish' ? UI_TEXT.polish : UI_TEXT.english;
}

function updateUIStrings() {
    const t = getUIText();
    
    document.getElementById('progressLabel').textContent = t.progressLabel;
    document.getElementById('instructionsText').textContent = t.instruction;
    document.getElementById('currentKeyLabel').textContent = t.pressLabel;
    document.getElementById('celebration').textContent = t.celebration;
    document.getElementById('finishTitle').textContent = t.finishTitle;
    
    const homeBtn = document.getElementById('homeButton');
    if (homeBtn) homeBtn.textContent = `🏠 ${t.homeButton}`;
    
    updateSoundButton();
    updateKeyboardButton();
}

function updateSoundButton() {
    const t = getUIText();
    const btn = document.getElementById('soundToggle');
    if (btn) {
        btn.textContent = soundEnabled ? t.soundOn : t.soundOff;
    }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    updateSoundButton();
}

function selectLanguage(lang) {
    currentLanguage = lang;
    
    const polishBtn = document.getElementById('langPolish');
    const englishBtn = document.getElementById('langEnglish');
    
    if (polishBtn) polishBtn.classList.toggle('active', lang === 'polish');
    if (englishBtn) englishBtn.classList.toggle('active', lang === 'english');
    
    updateStartScreenStrings();
    renderImageButtons(); // Re-render with translated names
}

function selectImage(imageId) {
    randomImageMode = false;
    selectedImage = IMAGES.find(img => img.id === imageId) || IMAGES[0];
    
    document.querySelectorAll('.image-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.imageId === imageId);
    });
    document.getElementById('randomImageBtn')?.classList.remove('active');
}

function selectRandomImage() {
    randomImageMode = true;
    selectedImage = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    
    document.querySelectorAll('.image-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById('randomImageBtn')?.classList.add('active');
}

function updateStartScreenStrings() {
    const t = getUIText();
    
    const langLabel = document.getElementById('startLangLabel');
    const imageLabel = document.getElementById('startImageLabel');
    const sizeLabel = document.getElementById('startSizeLabel');
    const startBtn = document.getElementById('startBtn');
    const scrollHint = document.getElementById('scrollHint');
    
    if (langLabel) langLabel.textContent = t.startLangLabel;
    if (imageLabel) imageLabel.textContent = t.startImageLabel;
    if (sizeLabel) sizeLabel.textContent = t.startSizeLabel;
    if (startBtn) startBtn.textContent = t.startButton;
    if (scrollHint) scrollHint.textContent = t.scrollHint;
}

function selectGridMode(mode) {
    currentGridMode = mode;
    
    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
    });
}

function renderSizeButtons() {
    const container = document.getElementById('sizeButtons');
    if (!container) return;
    container.innerHTML = '';
    
    Object.entries(GRID_MODES).forEach(([mode, config]) => {
        const btn = document.createElement('button');
        btn.className = 'size-btn' + (mode === currentGridMode ? ' active' : '');
        btn.dataset.mode = mode;
        btn.textContent = config.name;
        btn.onclick = () => selectGridMode(mode);
        container.appendChild(btn);
    });
}

function renderImageButtons() {
    const container = document.getElementById('imageButtons');
    container.innerHTML = '';
    
    const t = getUIText();
    
    // Add Random button first
    const randomBtn = document.createElement('button');
    randomBtn.className = 'image-btn random-btn' + (randomImageMode ? ' active' : '');
    randomBtn.id = 'randomImageBtn';
    randomBtn.onclick = () => selectRandomImage();
    
    const randomIcon = document.createElement('div');
    randomIcon.className = 'random-icon';
    randomIcon.textContent = '🎲';
    
    const randomName = document.createElement('span');
    randomName.className = 'image-name';
    randomName.textContent = t.randomImage;
    
    randomBtn.appendChild(randomIcon);
    randomBtn.appendChild(randomName);
    container.appendChild(randomBtn);
    
    // Add specific image buttons
    IMAGES.forEach((img) => {
        const btn = document.createElement('button');
        btn.className = 'image-btn' + (!randomImageMode && selectedImage.id === img.id ? ' active' : '');
        btn.dataset.imageId = img.id;
        btn.onclick = () => selectImage(img.id);
        
        const imgEl = document.createElement('img');
        imgEl.src = img.url;
        imgEl.alt = getImageName(img);
        imgEl.loading = 'lazy';
        
        const nameEl = document.createElement('span');
        nameEl.className = 'image-name';
        nameEl.textContent = getImageName(img);
        
        btn.appendChild(imgEl);
        btn.appendChild(nameEl);
        container.appendChild(btn);
    });
}

function startGame() {
    preloadLetterSounds();
    
    // If random mode, pick a random image now
    if (randomImageMode) {
        selectedImage = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    }
    
    generatePuzzlePieces();
    
    document.getElementById('startScreen').style.display = 'none';
    
    // Set the background image
    document.getElementById('backgroundImage').src = selectedImage.url;
    
    gameStarted = true;
    currentPieceIndex = 0;
    
    document.getElementById('progressTotal').textContent = TOTAL_PIECES;
    updateProgress();
    updateBackground();
    updateUIStrings();
    
    renderPuzzleGrid();
}

function showFinishScreen() {
    const t = getUIText();
    const finish = document.getElementById('finishScreen');
    const title = document.getElementById('finishTitle');
    const btn = finish.querySelector('.finish-button');
    const preview = document.getElementById('finishImagePreview');
    
    if (title) title.textContent = t.finishTitle;
    if (btn) btn.textContent = t.finishButton;
    
    // Show the completed image
    if (preview) {
        preview.innerHTML = `<img src="${selectedImage.url}" alt="Completed puzzle">`;
    }
    
    if (finish) {
        finish.style.display = 'flex';
    }
}

function hideFinishScreen() {
    const finish = document.getElementById('finishScreen');
    if (finish) finish.style.display = 'none';
}

function restartGame() {
    hideFinishScreen();
    
    // Always pick a random different image on replay
    const otherImages = IMAGES.filter(img => img.id !== selectedImage.id);
    selectedImage = otherImages[Math.floor(Math.random() * otherImages.length)];
    
    generatePuzzlePieces();
    
    // Set the background image
    document.getElementById('backgroundImage').src = selectedImage.url;
    
    gameStarted = true;
    currentPieceIndex = 0;
    
    document.getElementById('progressTotal').textContent = TOTAL_PIECES;
    updateProgress();
    updateBackground();
    updateUIStrings();
    
    renderPuzzleGrid();
}

function goHome() {
    hideFinishScreen();
    gameStarted = false;
    
    const start = document.getElementById('startScreen');
    if (start) start.style.display = 'flex';
    
    const grid = document.getElementById('puzzlesGrid');
    if (grid) grid.innerHTML = '';
    
    currentPieceIndex = 0;
    puzzlePieces = [];
}

// Initialize
document.addEventListener('keydown', handleKeyPress);
setupConfetti();
renderImageButtons();
renderSizeButtons();
renderKeyboard();
updateKeyboardButton();
selectLanguage(currentLanguage);
updateStartScreenStrings();
hideFinishScreen();

</script>
</body>
</html>
